name: Wireless Power Switch Button Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: wireless-power-switch-button-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          if [[ ! "${TAG}" =~ ^[0-9]+\.[0-9]+(\.0)?$ ]]; then
            echo "Tag must match vMAJOR.MINOR or vMAJOR.MINOR.0" >&2
            exit 1
          fi
          MAJOR="${TAG%%.*}"
          MINOR="${TAG#*.}"
          MINOR="${MINOR%%.*}"
          echo "major=${MAJOR}" >> "${GITHUB_OUTPUT}"
          echo "minor=${MINOR}" >> "${GITHUB_OUTPUT}"
          echo "full=${MAJOR}.${MINOR}.0" >> "${GITHUB_OUTPUT}"

      - name: Build release firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32c3
          path: ./
          command: idf.py -DVERSION_MAJOR=${{ steps.version.outputs.major }} -DVERSION_MINOR=${{ steps.version.outputs.minor }} -DVERSION_PATCH=0 build

      - name: Prepare release artifacts
        id: artifacts
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.full }}
        run: |
          set -euo pipefail
          APP_NAME="Wireless_power_switch_button_app_v${VERSION}.bin"
          MERGED_NAME="Wireless_power_switch_button_merged_v${VERSION}.bin"
          cp build/Wireless_power_switch_button.bin "${APP_NAME}"
          cp Wireless_power_switch_button_merged.bin "${MERGED_NAME}"
          sha256sum "${APP_NAME}" "${MERGED_NAME}" > SHA256SUMS
          echo "app_name=${APP_NAME}" >> "${GITHUB_OUTPUT}"
          echo "merged_name=${MERGED_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Validate firmware layout
        shell: python
        env:
          APP_NAME: ${{ steps.artifacts.outputs.app_name }}
          MERGED_NAME: ${{ steps.artifacts.outputs.merged_name }}
        run: |
          import os
          from pathlib import Path

          app = Path(os.environ["APP_NAME"]).read_bytes()
          merged = Path(os.environ["MERGED_NAME"]).read_bytes()
          app_offset = 0x10000
          app_partition_size = 0x100000
          nvs_start = 0x9000
          nvs_end = 0xF000

          if not app or len(app) > app_partition_size:
              raise SystemExit(f"invalid APP size: {len(app)}")
          if len(merged) < app_offset + len(app):
              raise SystemExit("merged image does not contain the complete APP image")
          if merged[app_offset:app_offset + len(app)] != app:
              raise SystemExit("APP image is not aligned at 0x10000 in merged image")
          if any(value != 0xFF for value in merged[nvs_start:nvs_end]):
              raise SystemExit("merged image NVS range 0x9000-0xEFFF is not blank")

      - name: Checkout firmware distribution branch
        id: dist_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: firmware-dist
          path: firmware-dist
          fetch-depth: 1

      - name: Initialize firmware distribution branch
        if: steps.dist_checkout.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p firmware-dist
          if [[ ! -d firmware-dist/.git ]]; then
            git -C firmware-dist init
            git -C firmware-dist remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git -C firmware-dist checkout --orphan firmware-dist
          git -C firmware-dist rm -rf . 2>/dev/null || true
          git -C firmware-dist clean -fdx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish firmware distribution
        id: distribution
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.full }}
          APP_NAME: ${{ steps.artifacts.outputs.app_name }}
          MERGED_NAME: ${{ steps.artifacts.outputs.merged_name }}
        run: |
          set -euo pipefail
          DIST_DIR="firmware-dist/firmware/v${VERSION}"
          LAUNCHPAD_DIR="firmware-dist/launchpad/v${VERSION}"
          mkdir -p "${DIST_DIR}" "${LAUNCHPAD_DIR}" firmware-dist/latest
          cp "${APP_NAME}" "${DIST_DIR}/${APP_NAME}"
          cp "${MERGED_NAME}" "${DIST_DIR}/${MERGED_NAME}"
          cp SHA256SUMS "${DIST_DIR}/SHA256SUMS"
          cp "${APP_NAME}" firmware-dist/latest/app.bin
          cp "${MERGED_NAME}" firmware-dist/latest/merged.bin

          git -C firmware-dist config user.name "github-actions[bot]"
          git -C firmware-dist config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C firmware-dist add -f "firmware/v${VERSION}" latest/app.bin latest/merged.bin
          if ! git -C firmware-dist diff --cached --quiet; then
            git -C firmware-dist commit -m "Publish firmware v${VERSION}"
          fi
          ARTIFACT_COMMIT="$(git -C firmware-dist rev-parse HEAD)"
          CDN_ROOT="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@${ARTIFACT_COMMIT}"
          FIRMWARE_ROOT="${CDN_ROOT}/firmware/v${VERSION}/"

          cat > "${LAUNCHPAD_DIR}/README.md" <<EOF
          # Wireless Power Switch Button v${VERSION}

          ## APP update

          Writes only the application partition at \`0x10000\`. It preserves NVS pairing,
          calibration and business settings. Use it only when the bootloader and partition
          layout have not changed.

          ## Merged firmware

          Writes a complete image at \`0x0\`, including bootloader, partition table and APP.
          Use it for first-time installation, recovery, or partition/bootloader changes.
          The image blanks NVS at \`0x9000-0xEFFF\`, so pairing and calibration data are lost.

          Neither image provides OTA. Both are flashed manually over USB/serial.
          EOF

          cat > "${LAUNCHPAD_DIR}/config.toml" <<EOF
          esp_toml_version = 1.0
          firmware_images_url = "${FIRMWARE_ROOT}"
          supported_apps = ["Wireless_power_switch_button_app", "Wireless_power_switch_button_merged"]
          config_readme_url = "https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@firmware-dist/launchpad/README.md"

          ["Wireless_power_switch_button_app"]
          image.esp32c3 = "${APP_NAME}"
          offset = "0x10000"
          description = "APP更新：只写入APP分区，保留NVS配对、校准和业务配置。仅适用于bootloader和分区表未变化的常规升级。"
          android_app_url = ""
          ios_app_url = ""
          chipsets = ["esp32c3"]
          readme.text = "https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@firmware-dist/launchpad/README.md"

          ["Wireless_power_switch_button_merged"]
          image.esp32c3 = "${MERGED_NAME}"
          offset = "0x0"
          description = "完整烧录：包含bootloader、分区表和APP，用于首次烧录或恢复。会清除NVS配对、校准和业务配置。"
          android_app_url = ""
          ios_app_url = ""
          chipsets = ["esp32c3"]
          readme.text = "https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@firmware-dist/launchpad/README.md"
          EOF

          APP_SIZE="$(stat -c%s "${DIST_DIR}/${APP_NAME}")"
          MERGED_SIZE="$(stat -c%s "${DIST_DIR}/${MERGED_NAME}")"
          APP_SHA256="$(sha256sum "${DIST_DIR}/${APP_NAME}" | cut -d' ' -f1)"
          MERGED_SHA256="$(sha256sum "${DIST_DIR}/${MERGED_NAME}" | cut -d' ' -f1)"
          cat > firmware-dist/last.toml <<EOF
          schema_version = 1
          version = "${VERSION}"
          published_at = "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          [firmware.app]
          filename = "${APP_NAME}"
          offset = "0x10000"
          size = ${APP_SIZE}
          sha256 = "${APP_SHA256}"
          url = "${FIRMWARE_ROOT}${APP_NAME}"

          [firmware.merged]
          filename = "${MERGED_NAME}"
          offset = "0x0"
          size = ${MERGED_SIZE}
          sha256 = "${MERGED_SHA256}"
          url = "${FIRMWARE_ROOT}${MERGED_NAME}"
          EOF

          cp "${LAUNCHPAD_DIR}/config.toml" firmware-dist/launchpad/latest.toml
          cp "${LAUNCHPAD_DIR}/README.md" firmware-dist/launchpad/README.md

          grep -q 'offset = "0x10000"' firmware-dist/launchpad/latest.toml
          grep -q 'offset = "0x0"' firmware-dist/launchpad/latest.toml

          git -C firmware-dist add "launchpad/v${VERSION}" launchpad/latest.toml launchpad/README.md last.toml
          if ! git -C firmware-dist diff --cached --quiet; then
            git -C firmware-dist commit -m "Update release metadata for v${VERSION}"
          fi
          METADATA_COMMIT="$(git -C firmware-dist rev-parse HEAD)"
          git -C firmware-dist push origin HEAD:firmware-dist

          CONFIG_PATH="launchpad/v${VERSION}/config.toml"
          CONFIG_URL="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@${METADATA_COMMIT}/${CONFIG_PATH}"
          echo "config_path=firmware-dist/${CONFIG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "config_url=${CONFIG_URL}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.full }}
          CONFIG_URL: ${{ steps.distribution.outputs.config_url }}
        run: |
          set -euo pipefail
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          REPOSITORY_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          APP_LAUNCHPAD="https://espressif.github.io/esp-launchpad/?flashConfigURL=${CONFIG_URL}&app=Wireless_power_switch_button_app&exact=true"
          MERGED_LAUNCHPAD="https://espressif.github.io/esp-launchpad/?flashConfigURL=${CONFIG_URL}&app=Wireless_power_switch_button_merged&exact=true"
          {
            echo "## Wireless Power Switch Button v${VERSION}"
            echo
            echo "### 版本变更"
            echo
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              git log --no-merges --pretty='- [`%h`]('"${REPOSITORY_URL}"'/commit/%H) %s' "${PREVIOUS_TAG}..${GITHUB_REF_NAME}"
              echo
              echo "[查看完整差异](${REPOSITORY_URL}/compare/${PREVIOUS_TAG}...${GITHUB_REF_NAME})"
            else
              git log --no-merges --pretty='- [`%h`]('"${REPOSITORY_URL}"'/commit/%H) %s' "${GITHUB_REF_NAME}"
            fi
            cat <<EOF

          ### 固件与烧录

          | 固件 | 起始地址 | 用途 |
          |------|----------|------|
          | \`*_app_v*.bin\` | \`0x10000\` | 只更新APP，保留NVS配对、校准和业务配置。 |
          | \`*_merged_v*.bin\` | \`0x0\` | 首次烧录或完整恢复；会清除NVS数据。 |

          - [APP固件在线烧录](${APP_LAUNCHPAD})
          - [merged固件在线烧录](${MERGED_LAUNCHPAD})

          button不支持OTA。两个固件均通过USB/串口手动烧录。只有bootloader和分区表未变化时才能使用APP固件。
          EOF
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.app_name }}
            ${{ steps.artifacts.outputs.merged_name }}
            SHA256SUMS
            ${{ steps.distribution.outputs.config_path }}
          body_path: release_notes.md
